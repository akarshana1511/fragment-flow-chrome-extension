<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="css/bootstrap.min.css" rel="stylesheet">
    <title>Fragment Flow Extension</title>
    <style>
    body{
        width: 350px;
        background-color: aquamarine;
    }</style>
</head>
<body>
    <body class="p-3">
    <div class="container-fluid p-0">
        <div class="d-flex align-items-center mb-3">
            <h6 class="m-0 text-primary fw-bold">Fragment Flow Extension</h6>
            <span class="badge bg-primary ms-auto">Threads: <span id="thread-count">0</span></span>
        </div>

        <div class="card border-0 shadow-sm mb-3">
            <div class="card-body p-3">
                <p id="status-text" class="small text-muted mb-2">Ready to accelerate downloads</p>
                <div class="progress mb-2" style="height: 8px;">
                    <div id="main-progress" class="progress-bar progress-bar-striped progress-bar-animated" role="progressbar" style="width: 0%"></div>
                </div>
                <div class="d-flex justify-content-between x-small text-secondary" style="font-size: 0.75rem;">
                    <span id="speed-display">0 KB/s</span>
                    <span id="percent-display">0%</span>
                </div>
            </div>
        </div>

        <button id="test-btn" class="btn btn-primary btn-sm w-100 shadow-sm">
            Check Connection
        </button>
    </div>
    <script src="js/bootstrap.bundle.min.js"></script>
    <script src="popup.js"></script>
</body>
</html>
