<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="css/bootstrap.min.css" rel="stylesheet">
    <title>Fragment Flow</title>
    <style>
    body {
        width: 400px;
        min-height: 400px; /* Forces the popup to have enough height */
        background-color: #f4f7f6;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        margin: 0;
        overflow: hidden; /* Hides both scrollbars */
    }
    .header-bg {
        background: linear-gradient(135deg, #0d6efd, #0dcaf0);
        color: white;
        padding: 15px;
        border-bottom-left-radius: 12px;
        border-bottom-right-radius: 12px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    .card {
        border-radius: 10px;
        border: none;
        box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    .progress-global { height: 14px; border-radius: 7px; }
    .thread-bar { height: 6px; border-radius: 3px; }
    .thread-row { padding: 8px 0; border-bottom: 1px solid #f0f0f0; }
    .thread-row:last-child { border-bottom: none; }
    .x-small { font-size: 0.75rem; }
</style>
</head>
<body>
    <div class="header-bg d-flex justify-content-between align-items-center mb-3">
        <h6 class="m-0 fw-bold">Fragment Flow</h6>
        <div>
            <button id="action-btn" class="btn btn-sm btn-light text-primary fw-bold me-2" style="display: none;">Pause</button>
            <button id="stop-btn" class="btn btn-sm btn-danger fw-bold me-2" style="display: none;">Stop</button>
            <span class="badge bg-light text-primary" id="status-badge">Idle</span>
        </div>
    </div>

    <div class="container-fluid px-3 pb-3">
        <div class="card p-3 mb-3">
            <div class="d-flex justify-content-between mb-1 align-items-end">
                <span id="file-name" class="fw-bold text-truncate" style="max-width: 200px; font-size: 0.9rem;">Waiting for download...</span>
                <span id="global-stats" class="small text-muted fw-bold">0.00 / 0.00 MB</span>
            </div>
            <div class="progress progress-global mb-2">
                <div id="global-progress" class="progress-bar progress-bar-striped progress-bar-animated bg-primary" style="width: 0%"></div>
            </div>
            <div class="d-flex justify-content-between x-small text-secondary fw-bold">
                <span id="global-speed">0 KB/s</span>
                <span id="global-percent" class="text-primary">0%</span>
            </div>
        </div>

        <div class="card p-3">
            <div class="d-flex justify-content-between align-items-center mb-2">
                <h6 class="m-0 small fw-bold text-secondary">Active Threads</h6>
                <span class="badge bg-secondary" id="thread-count">0</span>
            </div>
            <div id="threads-container">
                <div class="text-center text-muted x-small py-2" id="no-threads-msg">No active tasks</div>
            </div>
        </div>

        <!-- ==================== SWARM STATISTICS ====================  -->
        <div class="card p-3 mt-3" id="swarm-card" style="display: none;">
            <div class="d-flex justify-content-between align-items-center mb-2">
                <h6 class="m-0 small fw-bold text-secondary">🔗 P2P Swarm Network</h6>
                <span class="badge bg-info" id="peer-count">0 peers</span>
            </div>
            <div class="x-small text-muted">
                <div class="d-flex justify-content-between mb-1">
                    <span>Connected Peers:</span>
                    <span id="swarm-connected-peers" class="fw-bold text-info">0</span>
                </div>
                <div class="d-flex justify-content-between mb-1">
                    <span>Local Chunks:</span>
                    <span id="swarm-local-chunks" class="fw-bold text-success">0</span>
                </div>
                <div class="d-flex justify-content-between">
                    <span>Network Chunks:</span>
                    <span id="swarm-total-chunks" class="fw-bold text-primary">0</span>
                </div>
            </div>
        </div>
    </div>

    <script src="js/bootstrap.bundle.min.js"></script>
    <script src="popup.js"></script>
</body>
</html>
